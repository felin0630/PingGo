<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#173a5e">
<title>PingGo｜全賽事查詢</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<header class="hero">
  <div class="wrap">
    <h1>🏓 PingGo</h1>
    <p>孩子專心比賽，賽程交給我們。</p>
  </div>
</header>

<section class="panel wrap">
  <nav class="modes">
    <button class="mode active" data-mode="player">選手查詢</button>
    <button class="mode" data-mode="school">學校查詢</button>
    <button class="mode" data-mode="match">場次查詢</button>
  </nav>
  <input id="query" type="search" placeholder="輸入選手姓名、學校或場次" autocomplete="off">
  <select id="group"><option value="all">全部組別</option></select>
</section>

<main class="wrap">
  <div class="notice">
    每位選手會顯示「若一路晉級」的全部可能場次。後續對手及實際出賽資格，仍須以前一場紙本成績與大會隔日名單為準。
  </div>
  <div id="status" class="status">資料載入中…</div>
  <section id="results"></section>
  <div id="empty" class="message" hidden>找不到符合資料。</div>
  <div id="error" class="message" hidden>資料載入失敗，請重新整理。</div>
</main>
<footer>PingGo MVP・北區賽公開籤表整理</footer>
<script src="./app.js"></script>
</body>
</html>
